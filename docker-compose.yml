services:
    tether:
        build: .
        image: tether-agent
        env_file: .env
        stdin_open: true
        tty: true
        restart: always
        dns:
            - 8.8.8.8
            - 1.1.1.1
        healthcheck:
            test: ["CMD", "python", "-c", "import socket; socket.setdefaulttimeout(5); socket.socket().connect(('discord.com', 443))"]
            interval: 30m
            timeout: 10s
            retries: 3
            start_period: 30s
        volumes:
            - ./token.json:/app/token.json
            - ./credentials.json:/app/credentials.json
            - ./tether.log:/app/tether.log
            # Scheduler system prompt: edit on host, then `docker-compose
            # restart tether` picks it up — no rebuild (read at process start)
            - ./agent.md:/app/agent.md:ro
            # SQLite ledger lives at /app/data/ledger.db (directory mount so
            # Docker doesn't create a bogus directory in place of the file)
            - ./data:/app/data
            # Belki task files from the Obsidian vault, read-only.
            # Override BELKI_HOST_PATH in .env on hosts other than the
            # Windows dev box (e.g. a cloud VM's local git checkout of the
            # vault repo); defaults to the Windows share for local dev.
            - "${BELKI_HOST_PATH:-X:/Axiom Records/_belki_files}:/app/belki:ro"